<!DOCTYPE html>
<html>
<head>
    <title>Weather Advisor</title>

    <style>
        .clear {
        background: linear-gradient(to right, #56ccf2, #2f80ed);
        }

        .rain {
        background: linear-gradient(to right, #373B44, #4286f4);
        }

        .clouds {
        background: linear-gradient(to right, #bdc3c7, #2c3e50);
        }

        .default {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #4c83b3, #5dcaf5);
            margin: 0;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: rgb(229, 231, 231);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        form {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        input {
            padding: 12px;
            width: 60%;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-right: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .weather-box {
            text-align: center;
            padding: 20px;
            background: #f1f8ff;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .temp {
            font-size: 32px;
            font-weight: bold;
        }

        .rains {
            color: #555;
        }

        .card {
            background: #fafafa;
            padding: 15px;
            margin: 10px 0;
            border-left: 6px solid #007BFF;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .category {
            font-weight: bold;
            margin-bottom: 8px;
        }

        ul {
            margin: 0;
            padding-left: 20px;
        }

    </style>
</head>

<body class="
{% if condition == 'Clear' %}clear
{% elif condition == 'Rain' %}rain
{% elif condition == 'Clouds' %}clouds
{% else %}default
{% endif %}
">

<div class="container">
    <h1>🌦 Weather Advisor</h1>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city..." required>
        <button type="submit">Check</button>
    </form>

    {% if temp %}
    <div class="weather-box">
        <div class="temp">🌡 {{ temp }}°C</div>
        <div class="rains">🌧 Rain: {{ rain }} mm</div>
        <div>☁ Condition: {{ condition }}</div>
        <div>📍 {{ city }}</div>
    </div>
    {% endif %}

    {% if data %}
        {% for category, items in data.items() %}
            <div class="card">
                <div class="category">🔹 {{ category }}</div>
                <ul>
                    {% for item in items %}
                        <li>{{ item }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endfor %}
    {% endif %}

</div>

</body>
</html>
